<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한식코스메뉴</title>
  <style>
    body { margin: 0; padding: 10px; font-family: 'Shippori Mincho', serif; background: #f7f3ef; color: #333; }
    .card { max-width: 460px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.08); padding: 14px; transform: scale(0.95); }
    @media (max-width: 480px) { .card { padding: 12px; transform: scale(0.92); } }
    h1 { text-align: center; font-size: 1.6rem; margin-bottom: 8px; }
    p { text-align: center; color: #666; margin-top:0; font-size: 0.95rem; }
    .timetable-img { margin: 14px 0; }
    .timetable-img img { width: 100%; height: auto; border-radius: 10px; display: block; cursor: zoom-in; }
    .modal-lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 9999; }
    .modal-lightbox.show { display: flex; }
    .modal-lightbox img { max-width: 95%; max-height: 95%; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    .source { margin-top: 10px; font-size: 0.82rem; color: #777; text-align:center; }
    .btn { display:block; width: 170px; margin: 14px auto 0; text-align:center; background:#d81b60; color:#fff; border:none; border-radius: 10px; padding: 9px 0; text-decoration:none; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>한식코스요리</h1>

    <div class="timetable-img">
      <img id="timetableImg" src="menu.jpg" alt="메뉴" />
    </div>

    <div class="modal-lightbox" id="imgLightbox" onclick="this.classList.remove('show')">
      <img id="lightboxImage" src="menu.jpg" alt="확대" />
    </div>
  </div>

  <script>
    function downloadImage(url, filename) {
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    document.getElementById('saveBtn').addEventListener('click', function(event) {
      event.preventDefault();
      downloadImage('menujapan.jpg', 'menujapan.jpg');
    });
    document.getElementById('timetableImg').addEventListener('click', function() {
      document.getElementById('imgLightbox').classList.add('show');
      document.getElementById('lightboxImage').src = this.src;
    });

    document.getElementById('imgLightbox').addEventListener('click', function() {
      this.classList.remove('show');
    });
  </script>
</body>
</html>
