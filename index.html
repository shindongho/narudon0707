<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신동호 & 신나루미 결혼합니다</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Noto+Serif+KR:wght@200;400&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --main-pink: #fce4ec;
            --text-color: #444;
            --accent-color: #ffb7c5;
            --dark-pink: #d81b60;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Nanum Myeongjo', serif;
            background-color: #fff;
            color: var(--text-color);
            overflow-x: hidden;
            line-height: 1.8;
        }

        #petal-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; 
            z-index: 50;
        }

        section {
            padding: 80px 20px;
            text-align: center;
            min-height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .main-hero {
            height: 100vh;
            background: linear-gradient(rgba(255,255,255,0.5), rgba(255,255,255,0.5)), 
                        url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative; 
            z-index: 10;
            cursor: pointer;
        }

        .name-animation {
            z-index: 20;
            text-align: center;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 10px;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 60;
        }

        .photo-frame {
            background: #fff;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            cursor: pointer;
            position: relative; /* 아이콘 배치를 위해 relative 설정 */
            z-index: 70;
            transition: transform 0.2s ease;
        }

        .photo-frame:hover {
            transform: scale(1.02);
        }

        .photo-frame img { width: 100%; height: 200px; object-fit: cover; display: block; pointer-events: none; }

        /* --- 확대 마크(돋보기 아이콘) 스타일 추가 --- */
        .zoom-icon {
            position: absolute;
            bottom: 15px; /* 사진 프레임 하단에서 이격 */
            right: 15px;  /* 사진 프레임 우측에서 이격 */
            width: 24px;   /* 아이콘 크기 */
            height: 24px;
            background-color: rgba(255, 255, 255, 0.7); /* 반투명 흰색 배경 */
            border-radius: 50%; /* 원형 배경 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px; /* 아이콘 폰트 크기 */
            color: #555;      /* 아이콘 색상 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            pointer-events: none; /* 아이콘 자체는 클릭 불가 */
            z-index: 80; /* 이미지보다 위에 표시 */
        }

        /* 모달 스타일 */
        .modal {
            display: none; 
            position: fixed;
            z-index: 3000;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.85); 
            justify-content: center;
            align-items: center;
            cursor: pointer;
            opacity: 0; 
            transition: opacity 0.4s ease;
        }

        .modal.show {
            display: flex; 
            opacity: 1; 
        }

        .modal-content {
            max-width: 90%;
            max-height: 85%;
            border: 5px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            transform: scale(0.9); 
            transition: transform 0.4s ease; 
        }

        .modal.show .modal-content {
            transform: scale(1); 
        }

        .music-player {
            position: fixed;
            bottom: 25px; right: 25px;
            z-index: 1001;
            background: rgba(255, 255, 255, 0.95);
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

    <canvas id="petal-canvas"></canvas>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <img class="modal-content" id="modalImg">
    </div>

    <div class="music-player" onclick="toggleMusic(event)">
        <span id="music-icon">🎵</span>
        <audio id="bgMusic" loop preload="auto">
            <source src="./Our_Eternal_Vow.mp3" type="audio/mpeg">
        </audio>
    </div>

    <section class="main-hero" onclick="startMusic()"> 
        <div class="name-animation">
            <p>2026. 05. 02. SAT PM 5:00</p>
            <h1>신동호&신나루미</h1>
            <p>저희 결혼합니다</p>
            <p style="font-size: 0.8rem; color: #888;">(화면을 터치하면 음악이 시작됩니다 🌸)</p>
        </div>
    </section>

    <section>
        <h3 style="letter-spacing: 5px; color: #888; font-size: 0.9rem; margin-bottom: 30px;">GALLERY</h3>
        <div class="gallery-grid" id="gallery-container">
            </div>
    </section>

    <footer style="padding: 60px 20px; color: #bbb; text-align: center; font-size: 0.8rem;">
        <p>신랑 신동호 & 신부 신나루미</p>
        <p>Copyright 2026. All rights reserved.</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // 1. 갤러리 동적 생성 (AOS 연동 및 확대 마크 추가)
        const container = document.getElementById('gallery-container');
        for (let i = 1; i <= 20; i++) {
            const frame = document.createElement('div');
            frame.className = 'photo-frame';
            frame.setAttribute('data-aos', 'zoom-in');
            frame.onclick = function() {
                const img = this.querySelector('img');
                openModal(img.src);
            };
            // 이미지와 함께 확대 마크(돋보기 아이콘) 삽입
            frame.innerHTML = `
                <img src="https://picsum.photos/400/600?random=${i + 20}">
                <div class="zoom-icon">🔍</div> `;
            container.appendChild(frame);
        }

        AOS.init({ duration: 1200 });

        // 2. 모달 기능
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("modalImg");

        function openModal(src) {
            modalImg.src = src;
            modal.style.display = "flex"; 
            setTimeout(() => {
                modal.classList.add('show'); 
            }, 10);
            document.body.style.overflow = "hidden"; 
        }

        function closeModal() {
            modal.classList.remove('show'); 
            setTimeout(() => {
                modal.style.display = "none"; 
            }, 400); 
            document.body.style.overflow = "auto"; 
        }

        // 3. 음악 재생 로직
        const music = document.getElementById('bgMusic');
        const mIcon = document.getElementById('music-icon');

        async function startMusic() {
            if (music.paused) {
                try {
                    await music.play();
                    mIcon.innerText = '🌸';
                } catch (e) { console.log("대기중"); }
            }
        }

        function toggleMusic(e) {
            e.stopPropagation();
            if (music.paused) {
                music.play();
                mIcon.innerText = '🌸';
            } else {
                music.pause();
                mIcon.innerText = '🎵';
            }
        }

        window.addEventListener('scroll', startMusic, { once: true });
        window.addEventListener('click', startMusic, { once: true });

        // 4. 벚꽃 효과 (Canvas)
        const canvas = document.getElementById('petal-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let petals = [];
        class Petal {
            constructor() { this.reset(); this.y = Math.random() * canvas.height; }
            reset() {
                this.x = Math.random() * canvas.width; this.y = -20;
                this.size = Math.random() * 8 + 10; this.speed = Math.random() * 0.8 + 0.6;
                this.angle = Math.random() * 360; this.spin = Math.random() * 2 - 1;
                this.wind = Math.random() * 1.2;
                this.color = ['rgba(255, 182, 193, 0.6)', 'rgba(255, 225, 235, 0.5)'][Math.floor(Math.random() * 2)];
            }
            update() {
                this.y += this.speed; this.x += Math.sin(this.y / 60) * this.wind;
                this.angle += this.spin; if (this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle * Math.PI / 180);
                ctx.beginPath(); ctx.ellipse(0, 0, this.size, this.size / 1.6, 0, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill(); ctx.restore();
            }
        }
        for (let i = 0; i < 40; i++) petals.push(new Petal());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            petals.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>
</body>
</html>
